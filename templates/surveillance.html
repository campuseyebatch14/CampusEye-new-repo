{% extends "base.html" %}
{% block main %}
<div class="glass-card" style="max-width: 800px; margin: auto; text-align: center; padding: 2em;">
    <div id="status-bar" style="margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #334155; color: white; font-weight: 700; transition: 0.4s;">
        SYSTEM READY
    </div>

    <video id="video" width="100%" autoplay style="border-radius: 12px; background: #000;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <div style="margin-top: 25px;">
        <button id="start-btn" class="btn" style="background: #10b981;">START CAMERA</button>
        <button id="stop-btn" class="btn" style="background: #ef4444;" disabled>STOP CAMERA</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusBar = document.getElementById('status-bar');
    let interval = null;

    async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('stop-btn').disabled = false;
        statusBar.innerText = "MONITORING ACTIVE...";
        statusBar.style.background = "#0ea5e9";
        interval = setInterval(sendFrame, 4000);
    }

    async function sendFrame() {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);
        const img = canvas.toDataURL('image/jpeg', 0.5);

        const res = await fetch('/process-frame', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ image: img })
        });
        const data = await res.json();
        
        if (data.detected) {
            statusBar.innerText = data.message;
            statusBar.style.background = "#10b981";
            setTimeout(() => { statusBar.style.background = "#0ea5e9"; }, 2000);
        }
    }

    document.getElementById('start-btn').onclick = start;
    document.getElementById('stop-btn').onclick = () => location.reload();
</script>
{% endblock %}
